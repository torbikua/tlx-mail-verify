version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mail_verifier_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mail_verifier_network

  app:
    build: .
    container_name: mail_verifier_app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    networks:
      - mail_verifier_network

volumes:
  mysql_data:

networks:
  mail_verifier_network:
    driver: bridge
